services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: giftoso_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - giftoso_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: giftoso_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - giftoso_network

  # Store Backend (Medusa Server)
  medusa:
    build:
      context: ./storebackend
      dockerfile: Dockerfile
    container_name: giftoso_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
    env_file:
      - ./storebackend/.env
    volumes:
      - ./storebackend:/server
      - /server/node_modules
    networks:
      - giftoso_network

  # Storefront (Next.js)
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
    container_name: giftoso_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - MEDUSA_BACKEND_URL=http://medusa:9000
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
    env_file:
      - ./storefront/.env.local
    volumes:
      - ./storefront:/app
      - /app/node_modules
      - /app/.next
    networks:
      - giftoso_network

volumes:
  postgres_data:


networks:
  giftoso_network:
    driver: bridge
